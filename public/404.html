<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 · Scroll Vessel</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f6e4ad;
      --paper-warm: #efd18a;
      --ink: #2f210f;
      --ink-soft: rgba(47, 33, 15, 0.72);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Crimson Pro", "Noto Serif SC", Georgia, serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 249, 214, 0.45), transparent 18rem),
        radial-gradient(circle at 76% 72%, rgba(127, 79, 24, 0.12), transparent 22rem),
        repeating-linear-gradient(92deg, rgba(47, 33, 15, 0.02) 0 1px, transparent 1px 13px),
        repeating-linear-gradient(4deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 17px),
        linear-gradient(135deg, #f9e9b7 0%, var(--paper) 46%, var(--paper-warm) 72%, #d6a74f 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .book {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      min-height: 100vh;
      padding: clamp(28px, 5vw, 72px) 0;
      position: relative;
      overflow: hidden;
    }

    .book::before,
    .book::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    .book::before {
      background:
        radial-gradient(circle at 14% 24%, rgba(81, 45, 13, 0.1) 0 0.18rem, transparent 0.22rem),
        radial-gradient(circle at 88% 18%, rgba(81, 45, 13, 0.08) 0 0.14rem, transparent 0.2rem),
        radial-gradient(circle at 72% 88%, rgba(81, 45, 13, 0.1) 0 0.22rem, transparent 0.28rem);
    }

    .book::after {
      background:
        radial-gradient(ellipse at 50% -8%, rgba(255, 250, 218, 0.34), transparent 24rem),
        radial-gradient(ellipse at 50% 108%, rgba(74, 43, 12, 0.08), transparent 24rem);
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: baseline;
      margin-bottom: clamp(38px, 6vw, 70px);
      font-family: "Cinzel", ui-serif, serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 12px;
    }

    .brand {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      font-weight: 700;
    }

    .folio-state {
      color: rgba(47, 33, 15, 0.58);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(360px, 1.08fr);
      gap: clamp(36px, 6vw, 72px);
      align-items: center;
    }

    .overline {
      margin: 0 0 18px;
      font-family: "Cinzel", ui-serif, serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: "Cormorant Garamond", "Noto Serif SC", Georgia, serif;
      font-size: clamp(58px, 8vw, 104px);
      font-weight: 700;
      line-height: 0.88;
      letter-spacing: -0.055em;
    }

    .routes {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      margin-top: 32px;
      font-family: "Cinzel", ui-serif, serif;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .map-link {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      position: relative;
    }

    .map-link::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 8px;
      border-bottom: 1px solid currentColor;
      opacity: 0.35;
    }

    .chart {
      min-height: 430px;
      position: relative;
      isolation: isolate;
    }

    .chart svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .compass {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 126px;
      height: 126px;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      font-family: "Cinzel", ui-serif, serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.04em;
      text-align: center;
    }

    .point {
      position: absolute;
      left: 5%;
      top: 24%;
      min-height: 44px;
      padding-left: 18px;
      color: var(--ink-soft);
      font-size: 14px;
      line-height: 1.55;
    }

    .point::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.55em;
      width: 9px;
      height: 9px;
      border: 1px solid var(--ink);
      background: rgba(47, 33, 15, 0.1);
      transform: rotate(45deg);
    }

    .point strong {
      display: block;
      margin-bottom: 4px;
      color: var(--ink);
      font-family: "Cinzel", ui-serif, serif;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .route-note {
      position: absolute;
      left: 38%;
      bottom: 4%;
      width: min(330px, 58%);
      min-height: 112px;
      padding: 16px 20px;
      color: var(--ink-soft);
      background:
        radial-gradient(ellipse at 24% 22%, rgba(255, 250, 218, 0.24), transparent 7rem),
        rgba(246, 228, 173, 0.34);
      box-shadow:
        inset 0 1px 0 rgba(47, 33, 15, 0.2),
        inset 0 -1px 0 rgba(47, 33, 15, 0.14);
    }

    .label {
      margin-bottom: 10px;
      font-family: "Cinzel", ui-serif, serif;
      font-size: 11px;
      letter-spacing: 0.17em;
      text-transform: uppercase;
    }

    .route-note strong {
      display: block;
      color: var(--ink);
      font-size: 20px;
      line-height: 1.1;
    }

    .route-note p {
      margin: 8px 0 0;
      font-size: 14px;
      line-height: 1.58;
    }

    :focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: 5px;
    }

    @media (max-width: 820px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .chart {
        min-height: 380px;
      }
    }

    @media (max-width: 560px) {
      .book {
        width: min(100% - 18px, 1180px);
        padding: 26px 0;
      }

      .nav {
        flex-direction: column;
        margin-bottom: 48px;
      }

      h1 {
        font-size: clamp(44px, 15vw, 68px);
      }

      .route-note {
        left: 0;
        right: 0;
        bottom: 0;
        width: auto;
      }
    }
  </style>
</head>
<body>
  <main class="book">
    <div class="content">
      <nav class="nav" aria-label="404 页面状态">
        <a class="brand" href="/">卷书成船 / Scroll Vessel</a>
        <div class="folio-state">Missing folio</div>
      </nav>

      <section class="hero" aria-labelledby="not-found-title">
        <div>
          <p class="overline">404 · Route not charted</p>
          <h1 id="not-found-title">这页没有<br />收进海图。</h1>
          <div class="routes">
            <a class="map-link" href="/">回到首页</a>
          </div>
        </div>

        <div class="chart" aria-label="404 缺页海图示意">
          <svg viewBox="0 0 620 430" aria-hidden="true">
            <defs>
              <pattern id="waves-404" width="42" height="21" patternUnits="userSpaceOnUse">
                <path d="M0 10 C10 2 21 19 31 10 C36 6 39 6 42 10" fill="none" stroke="rgba(47,33,15,.11)" stroke-width="1" />
              </pattern>
            </defs>
            <rect x="0" y="0" width="620" height="430" fill="url(#waves-404)" opacity="0.58" />
            <circle cx="320" cy="220" r="150" fill="none" stroke="rgba(47,33,15,.18)" />
            <circle cx="320" cy="220" r="92" fill="none" stroke="rgba(47,33,15,.14)" />
            <path d="M320 58 L320 382 M120 220 L520 220" stroke="rgba(47,33,15,.12)" />
            <path d="M320 100 L338 220 L320 340 L302 220 Z" fill="rgba(47,33,15,.018)" stroke="rgba(47,33,15,.34)" />
            <path d="M320 220 C252 172 188 150 96 132" fill="none" stroke="rgba(47,33,15,.44)" stroke-width="1.35" stroke-dasharray="7 9" />
            <path d="M320 220 C252 282 178 334 88 382" fill="none" stroke="rgba(47,33,15,.34)" stroke-width="1.15" stroke-dasharray="3 8" />
            <path d="M320 220 C390 172 450 150 548 126" fill="none" stroke="rgba(47,33,15,.18)" stroke-width="1.05" stroke-dasharray="3 11" />
            <path d="M244 154 L260 164 M198 318 L216 306 M438 154 L456 146" stroke="rgba(47,33,15,.34)" stroke-width="1" />
          </svg>

          <div class="compass">404</div>
          <div class="point"><strong>Home</strong>重新出发</div>
          <div class="route-note">
            <div class="label">Route note</div>
            <strong>只留返航点</strong>
            <p>你抵达的地址没有对应的书页。它可能还未写入目录，也可能已经换了航线。先回到首页，从完整的书页海图重新出发。</p>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
